# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: MindClash CI-CD
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'
        cache-dependency-path: go.sum
    - name: Install Dependencies
      run: go mod download
    - name: Tidy Dependencies
      run: | 
        go mod tidy
        git diff --exit-code
    - name: Test
      run: go test -v ./...
    - name: Build
      run: go build -v -o mindclash ./cmd/server
    - name: Build the Docker image
      run: docker build -t mindclash .
    - name: Login to Github 
      uses: docker/login-activity@v4
      with:
        username: ${{secrets.DOCKER_USERNAME}}
        password: ${{secrets.DOCKER_PASSWORD}}
    - name:  Docker Image Push
      run: |
        docker tag mindclash ${{secrets.DOCKER_USERNAME}}/mindclash:v1
        docker push ${{secrets.DOCKER_USERNAME}}/mindclash:v1