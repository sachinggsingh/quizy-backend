# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go
name: MindClash CI-CD
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: "1.25"
        cache-dependency-path: go.sum
    - name: Download Dependencies
      run: go mod download
    - name: Verify Dependencies
      run: |
        go mod tidy
        git diff --exit-code
    - name: Run Tests
      run: go test -v ./...
    - name: Build Binary
      run: go build -v -o mindclash ./cmd/server
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mindclash:${{github.sha}} .
        docker tag ${{ secrets.DOCKER_USERNAME }}/mindclash:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/mindclash:latest

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/mindclash:${{github.sha}}
        docker push ${{ secrets.DOCKER_USERNAME }}/mindclash:latest