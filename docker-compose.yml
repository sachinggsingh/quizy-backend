services:
  backend:
    build: .
    container_name: backend
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/quiz
      - REDIS_HOST=redis
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - backend
    restart: always

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: always

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command:
      [
        "redis-server",
        "--appendonly","yes",
        "--requirepass","${REDIS_PASSWORD}"
      ]
    env_file:
      - .env
    healthcheck:
      test: ["CMD","redis-cli","-a","${REDIS_PASSWORD}","ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - backend

volumes:
  redis_data:
  mongo_data:

networks:
  backend:
    driver: bridge
